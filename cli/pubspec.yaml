name: kinetic_ui
description: >-
  Flutter UI component CLI inspired by shadcn/ui. Copy-paste source code
  directly into your project — full ownership, no runtime dependency.
version: 1.0.0
repository: https://github.com/dangminhkhoi2212/Kinetic-UI
homepage: https://github.com/dangminhkhoi2212/Kinetic-UI
issue_tracker: https://github.com/dangminhkhoi2212/Kinetic-UI/issues

topics:
  - flutter
  - cli
  - ui
  - widget
  - design-system

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.0
  http: ^1.2.0
  path: ^1.9.0
  crypto: ^3.0.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0

executables:
  kinetic: kinetic
